<!-- login.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0D0221;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, #0D0221 0%, #1A0533 50%, #0D0221 100%);
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 30px 24px;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            margin: 0 auto 20px;
            display: block;
            border: 2px solid #EA80FC;
            box-shadow: 0 0 40px rgba(234, 128, 252, 0.4);
            object-fit: cover;
        }
        .title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 20px rgba(123, 31, 162, 0.8);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-bottom: 4px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }
        .input-group .input-wrap {
            display: flex;
            align-items: center;
            background: #1A0533;
            border-radius: 12px;
            padding: 0 16px;
            border: 1px solid rgba(123, 31, 162, 0.3);
            transition: border 0.2s;
        }
        .input-group .input-wrap:focus-within {
            border-color: #EA80FC;
        }
        .input-group .input-wrap i {
            color: #EA80FC;
            font-size: 18px;
            width: 24px;
        }
        .input-group .input-wrap input {
            width: 100%;
            padding: 14px 8px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
        }
        .input-group .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .input-group .input-wrap .toggle-pass {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .input-group .input-wrap .toggle-pass:hover {
            color: #EA80FC;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
            box-shadow: 0 8px 30px rgba(123, 31, 162, 0.5);
            transition: all 0.2s;
            letter-spacing: 1px;
            margin-top: 8px;
            position: relative;
        }
        .btn-login:hover {
            transform: scale(1.02);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
        }
        .btn-login .spinner {
            display: none;
            width: 24px;
            height: 24px;
            margin: 0 auto;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-login.loading .btn-text {
            display: none;
        }
        .btn-login.loading .spinner {
            display: block;
        }
        .error-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px 16px;
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }
        .error-box.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }
        .footer a {
            color: #EA80FC;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <img src="src/assets/img/logo.png" alt="Vortex Ghost" class="logo" />

        <div class="title">Vortex Ghost</div>
        <div class="subtitle">Log In to continue</div>

        <!-- Form -->
        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Masukkan username" required />
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Masukkan password" required />
                    <button type="button" class="toggle-pass" id="togglePass">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span class="btn-text">LOG IN</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div class="error-box" id="errorBox"></div>

        <div class="footer">
            &copy; Present by <a href="https://t.me/HANZZXBUG" target="_blank">HANZZ</a>
        </div>
    </div>

    <script>
        (function() {
            // === DOM ===
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const btnLogin = document.getElementById('btnLogin');
            const errorBox = document.getElementById('errorBox');
            const togglePass = document.getElementById('togglePass');

            // === State ===
            let isLoading = false;

            // === Toggle Password Visibility ===
            togglePass.addEventListener('click', function() {
                const icon = this.querySelector('i');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.className = 'fas fa-eye';
                } else {
                    passwordInput.type = 'password';
                    icon.className = 'fas fa-eye-slash';
                }
            });

            // === Android ID (gunakan localStorage sebagai pengganti device_info_plus) ===
            function getAndroidId() {
                let id = localStorage.getItem('androidId');
                if (!id) {
                    id = 'web_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                    localStorage.setItem('androidId', id);
                }
                return id;
            }

            // === Auto Login (seperti initLogin di Flutter) ===
            function autoLogin() {
                const savedUser = localStorage.getItem('username');
                const savedPass = localStorage.getItem('password');
                const savedKey = localStorage.getItem('sessionKey');
                const androidId = getAndroidId();

                if (savedUser && savedPass && savedKey) {
                    // Cek ke server apakah session masih valid
                    const url =
                        `http://private.lynzzofficial.com:2355/myInfo?username=${encodeURIComponent(savedUser)}&password=${encodeURIComponent(savedPass)}&androidId=${encodeURIComponent(androidId)}&key=${encodeURIComponent(savedKey)}`;

                    fetch(url)
                        .then(r => r.json())
                        .then(data => {
                            if (data.valid === true && data.expired !== true) {
                                // Update localStorage dengan data terbaru
                                localStorage.setItem('role', data.role || 'member');
                                localStorage.setItem('expiredDate', data.expiredDate || '');
                                localStorage.setItem('sessionKey', savedKey);
                                window.location.href = 'splash.html';
                            }
                            // Jika tidak valid, biarkan user login manual
                        })
                        .catch(() => {});
                }
            }

            // Panggil auto login saat halaman dimuat
            autoLogin();

            // === Login Handler ===
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                if (isLoading) return;

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    showError('Username dan password tidak boleh kosong!');
                    return;
                }

                isLoading = true;
                btnLogin.classList.add('loading');
                btnLogin.disabled = true;
                hideError();

                const androidId = getAndroidId();

                try {
                    const response = await fetch('http://private.lynzzofficial.com:2355/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            username: username,
                            password: password,
                            androidId: androidId
                        })
                    });

                    const data = await response.json();

                    // Cek expired
                    if (data.expired === true) {
                        showError('⏳ Masa akses Anda telah habis. Silakan perpanjang akses.');
                        isLoading = false;
                        btnLogin.classList.remove('loading');
                        btnLogin.disabled = false;
                        return;
                    }

                    // Cek valid
                    if (data.valid !== true) {
                        // Cek pesan error untuk device mismatch
                        const msg = data.message || 'Username atau password salah.';
                        if (msg.toLowerCase().includes('perangkat') || msg.toLowerCase().includes('device')) {
                            showError('⚠️ Akun ini sedang login di perangkat lain. Silakan logout terlebih dahulu.');
                        } else {
                            showError('❌ ' + msg);
                        }
                        isLoading = false;
                        btnLogin.classList.remove('loading');
                        btnLogin.disabled = false;
                        return;
                    }

                    // === LOGIN SUKSES ===
                    // Simpan ke localStorage
                    localStorage.setItem('username', username);
                    localStorage.setItem('password', password);
                    localStorage.setItem('sessionKey', data.key);
                    localStorage.setItem('role', data.role || 'member');
                    localStorage.setItem('expiredDate', data.expiredDate || '');
                    localStorage.setItem('androidId', androidId);

                    // Redirect ke splash.html
                    window.location.href = 'splash.html';

                } catch (err) {
                    showError('⚠️ Gagal terhubung ke server. Periksa koneksi internet Anda.');
                    isLoading = false;
                    btnLogin.classList.remove('loading');
                    btnLogin.disabled = false;
                }
            });

            // === Helper Functions ===
            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.classList.add('show');
            }

            function hideError() {
                errorBox.classList.remove('show');
            }

        })();
    </script>

</body>
</html>
