<!-- change_password.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0D0221;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            background: linear-gradient(180deg, #0D0221 0%, #1A0533 50%, #0D0221 100%);
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #7B1FA2;
            border-radius: 4px;
        }

        .app-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: transparent;
        }
        .app-header .back-btn {
            background: none;
            border: none;
            color: #EA80FC;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            margin-right: 12px;
        }
        .app-header .title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            flex: 1;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 40px;
        }

        /* Icon Header */
        .icon-header {
            display: flex;
            justify-content: center;
            margin: 20px 0 16px 0;
        }
        .icon-header .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
            box-shadow: 0 0 40px rgba(234, 128, 252, 0.3);
        }

        .page-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }
        .page-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-top: 4px;
            margin-bottom: 24px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .form-group .input-wrap {
            display: flex;
            align-items: center;
            background: #1E1E2E;
            border-radius: 12px;
            padding: 0 16px;
            border: 1px solid rgba(123, 31, 162, 0.3);
            transition: border 0.2s;
        }
        .form-group .input-wrap:focus-within {
            border-color: #EA80FC;
        }
        .form-group .input-wrap i {
            color: #EA80FC;
            font-size: 18px;
            width: 24px;
        }
        .form-group .input-wrap input {
            width: 100%;
            padding: 14px 8px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
        }
        .form-group .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .form-group .input-wrap .toggle-pass {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .form-group .input-wrap .toggle-pass:hover {
            color: #EA80FC;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
            box-shadow: 0 8px 30px rgba(123, 31, 162, 0.4);
            transition: all 0.2s;
            margin-top: 16px;
            letter-spacing: 0.5px;
            position: relative;
        }
        .btn-submit:hover {
            transform: scale(1.02);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
        }
        .btn-submit .spinner {
            display: none;
            width: 24px;
            height: 24px;
            margin: 0 auto;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn-submit.loading .btn-text {
            display: none;
        }
        .btn-submit.loading .spinner {
            display: block;
        }

        /* Modal Alert */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #1E1E2E;
            border-radius: 20px;
            border: 1px solid rgba(234, 128, 252, 0.2);
            max-width: 360px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .modal .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .modal .modal-title i {
            color: #EA80FC;
        }
        .modal .modal-title i.success {
            color: #4CAF50;
        }
        .modal .modal-title i.error {
            color: #ff6b6b;
        }
        .modal .modal-body {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .modal .modal-actions {
            display: flex;
            justify-content: center;
        }
        .modal .modal-actions .btn-ok {
            padding: 12px 40px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal .modal-actions .btn-ok:hover {
            transform: scale(1.02);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 500px;
            width: calc(100% - 32px);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.3s ease;
        }
        .toast.show {
            display: block;
        }
        .toast.success {
            background: rgba(76, 175, 80, 0.9);
            color: #fff;
        }
        .toast.error {
            background: rgba(255, 0, 0, 0.85);
            color: #fff;
        }
        .toast.info {
            background: rgba(123, 31, 162, 0.9);
            color: #fff;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='profile.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <span class="title">CHANGE PASSWORD</span>
        <div style="width:36px;"></div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container" id="mainContainer">
        <!-- Icon -->
        <div class="icon-header">
            <div class="circle">
                <i class="fas fa-lock-reset"></i>
            </div>
        </div>

        <div class="page-title">SECURITY UPDATE</div>
        <div class="page-subtitle">Masukkan password lama dan baru.</div>

        <!-- Form -->
        <form id="passwordForm" autocomplete="off">
            <!-- Old Password -->
            <div class="form-group">
                <label>Old Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="oldPass" placeholder="Masukkan password lama" required />
                    <button type="button" class="toggle-pass" onclick="toggleVisibility('oldPass', this)">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-vpn-key"></i>
                    <input type="password" id="newPass" placeholder="Masukkan password baru" required />
                    <button type="button" class="toggle-pass" onclick="toggleVisibility('newPass', this)">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="confirmPass" placeholder="Konfirmasi password baru" required />
                    <button type="button" class="toggle-pass" onclick="toggleVisibility('confirmPass', this)">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">UPDATE PASSWORD</span>
                <span class="spinner"></span>
            </button>
        </form>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== MODAL ALERT ===== -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal">
            <div class="modal-title" id="alertTitle">
                <i class="fas fa-info-circle"></i> Information
            </div>
            <div class="modal-body" id="alertBody">Pesan</div>
            <div class="modal-actions">
                <button class="btn-ok" onclick="closeAlert()">OK</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  CHANGE PASSWORD - SAMA PERSIS DENGAN change_password_page.dart
        // ============================================================

        (function() {
            'use strict';

            // === CONSTANTS ===
            const API_BASE = 'http://private.lynzzofficial.com:2355';

            // === STATE ===
            const username = localStorage.getItem('username') || '';
            const sessionKey = localStorage.getItem('sessionKey') || '';
            let isLoading = false;

            // === DOM REFS ===
            const oldPass = document.getElementById('oldPass');
            const newPass = document.getElementById('newPass');
            const confirmPass = document.getElementById('confirmPass');
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('passwordForm');
            const toast = document.getElementById('toast');
            const alertModal = document.getElementById('alertModal');
            const alertTitle = document.getElementById('alertTitle');
            const alertBody = document.getElementById('alertBody');

            // === HELPERS ===
            function showToast(msg, type = 'info') {
                toast.textContent = msg;
                toast.className = 'toast show ' + type;
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.className = 'toast';
                }, 3000);
            }

            function showAlert(title, body, isSuccess = false) {
                const icon = isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle';
                const color = isSuccess ? 'success' : 'error';
                alertTitle.innerHTML = `<i class="fas ${icon} ${color}"></i> ${title}`;
                alertBody.textContent = body;
                alertModal.classList.add('open');
            }

            function closeAlert() {
                alertModal.classList.remove('open');
            }

            // === TOGGLE PASSWORD VISIBILITY ===
            window.toggleVisibility = function(inputId, btn) {
                const input = document.getElementById(inputId);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'fas fa-eye';
                } else {
                    input.type = 'password';
                    icon.className = 'fas fa-eye-slash';
                }
            };

            // === CLOSE MODAL ON OVERLAY CLICK ===
            alertModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeAlert();
                }
            });

            // === CHANGE PASSWORD ===
            async function changePassword() {
                const old = oldPass.value.trim();
                const newP = newPass.value.trim();
                const confirm = confirmPass.value.trim();

                // Validasi
                if (!old || !newP || !confirm) {
                    showAlert('Peringatan', 'Semua field harus diisi.');
                    return;
                }

                if (newP !== confirm) {
                    showAlert('Peringatan', 'Password baru tidak cocok dengan konfirmasi.');
                    return;
                }

                isLoading = true;
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;

                try {
                    const response = await fetch(`${API_BASE}/changepass`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            username: username,
                            oldPass: old,
                            newPass: newP,
                            sessionKey: sessionKey
                        })
                    });

                    const data = await response.json();

                    if (data.success === true) {
                        showAlert('Sukses', 'Password berhasil diubah!', true);
                        // Clear form
                        oldPass.value = '';
                        newPass.value = '';
                        confirmPass.value = '';
                        // Redirect setelah delay
                        setTimeout(() => {
                            window.location.href = 'profile.html';
                        }, 1500);
                    } else {
                        showAlert('Gagal', data.message || 'Gagal mengubah password.');
                    }
                } catch (e) {
                    showAlert('Error', `Koneksi error: ${e.message}`);
                } finally {
                    isLoading = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            }

            // === FORM SUBMIT ===
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                changePassword();
            });

            // === ENTER KEY SUPPORT ===
            document.querySelectorAll('#passwordForm input').forEach((input) => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        changePassword();
                    }
                });
            });

            // === INIT ===
            function init() {
                // Cek session
                if (!sessionKey || !username) {
                    window.location.href = 'login.html';
                    return;
                }
            }

            // === EXPOSE GLOBAL ===
            window.closeAlert = closeAlert;

            init();

        })();
    </script>

</body>
</html>
