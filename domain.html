<!-- domain.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain OSINT - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D0221; color: #fff; font-family: 'Share Tech Mono', monospace;
            min-height: 100vh; background: linear-gradient(180deg, #0D0221 0%, #1A0533 50%, #0D0221 100%);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7B1FA2; border-radius: 4px; }

        .app-header {
            display: flex; align-items: center; padding: 16px 20px;
            background: rgba(13,2,33,0.95); border-bottom: 1px solid rgba(234,128,252,0.1);
            position: sticky; top: 0; z-index: 10;
        }
        .app-header .back-btn {
            background: none; border: none; color: #EA80FC; font-size: 20px;
            cursor: pointer; padding: 4px; margin-right: 12px;
        }
        .app-header .title {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
            color: #fff; flex: 1; text-align: center;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 16px 20px; padding-bottom: 40px; }

        .input-section {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(123,31,162,0.2); margin-bottom: 16px;
        }
        .input-section .header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .input-section .header i { color: #EA80FC; font-size: 18px; }
        .input-section .header h3 { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #EA80FC; }
        .input-section .input-wrap { display: flex; gap: 10px; }
        .input-section .input-wrap input {
            flex: 1; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(123,31,162,0.3); background: rgba(255,255,255,0.05);
            color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        .input-section .input-wrap input:focus { border-color: #EA80FC; }
        .input-section .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        .input-section .input-wrap button {
            padding: 14px 24px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .input-section .input-wrap button:hover { transform: scale(1.02); }
        .input-section .input-wrap button:disabled { opacity: 0.6; cursor: not-allowed; transform: scale(1); }

        .result-section {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(123,31,162,0.2); display: none;
        }
        .result-section.show { display: block; }

        .result-section .cat {
            margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px;
        }
        .result-section .cat:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .result-section .cat .title {
            font-family: 'Orbitron', sans-serif; font-size: 13px; color: #EA80FC;
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .result-item {
            display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .result-item:last-child { border-bottom: none; }
        .result-item .label { color: rgba(255,255,255,0.5); font-size: 13px; }
        .result-item .value { color: #fff; font-size: 14px; font-weight: 500; word-break: break-all; }

        .subdomain-item {
            padding: 8px 12px; margin-bottom: 4px; border-radius: 8px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8); font-size: 13px; font-family: 'Share Tech Mono', monospace;
            display: flex; justify-content: space-between; align-items: center;
        }
        .subdomain-item .copy {
            color: #EA80FC; cursor: pointer; font-size: 14px;
            padding: 4px 8px; border-radius: 4px; transition: background 0.2s;
        }
        .subdomain-item .copy:hover { background: rgba(234,128,252,0.1); }

        .loading-state { text-align: center; padding: 40px 0; display: none; }
        .loading-state.show { display: block; }
        .loading-state .spinner {
            width: 40px; height: 40px; margin: 0 auto 12px;
            border: 3px solid rgba(234,128,252,0.2); border-top: 3px solid #EA80FC;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state {
            background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3);
            border-radius: 16px; padding: 16px; display: none; margin-bottom: 16px;
        }
        .error-state.show { display: block; }
        .error-state .row { display: flex; align-items: center; gap: 12px; }
        .error-state .row i { color: #ff6b6b; font-size: 20px; }
        .error-state .row p { color: #ff6b6b; font-size: 14px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            max-width: 500px; width: calc(100% - 32px); padding: 14px 20px;
            border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 2000;
            display: none; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
        }
        .toast.show { display: block; }
        .toast.success { background: rgba(76,175,80,0.9); color: #fff; }
        .toast.error { background: rgba(255,0,0,0.85); color: #fff; }
        .toast.info { background: rgba(123,31,162,0.9); color: #fff; }
        @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <span class="title">DOMAIN OSINT</span>
        <div style="width:36px;"></div>
    </header>
    <div class="container">
        <div class="input-section">
            <div class="header"><i class="fas fa-globe"></i><h3>MASUKKAN DOMAIN</h3></div>
            <div class="input-wrap">
                <input type="text" id="domainInput" placeholder="Contoh: nullxteam.fun" />
                <button id="checkBtn" onclick="checkDomain()">CEK DOMAIN</button>
            </div>
        </div>

        <div class="loading-state" id="loadingState"><div class="spinner"></div><p>Menganalisis domain...</p></div>
        <div class="error-state" id="errorState"><div class="row"><i class="fas fa-exclamation-circle"></i><p id="errorText">Error</p></div></div>

        <div class="result-section" id="resultSection">
            <div class="cat">
                <div class="title"><i class="fas fa-info-circle"></i> INFORMASI DOMAIN</div>
                <div class="result-item"><span class="label">Domain</span><span class="value" id="rDomain">-</span></div>
                <div class="result-item"><span class="label">Punycode</span><span class="value" id="rPunycode">-</span></div>
            </div>
            <div class="cat">
                <div class="title"><i class="fas fa-server"></i> SUBDOMAINS</div>
                <div id="subdomainsList"></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const DNS_API = 'https://api.siputzx.my.id/api/tools/dns?domain=';
        const SUB_API = 'https://api.siputzx.my.id/api/tools/subdomains?domain=';
        const sessionKey = localStorage.getItem('sessionKey') || '';
        const username = localStorage.getItem('username') || '';

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show ' + type;
            clearTimeout(t._timer); t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function setLoading(loading) {
            const btn = document.getElementById('checkBtn');
            const loader = document.getElementById('loadingState');
            if (loading) { loader.classList.add('show'); btn.disabled = true; btn.textContent = 'PROSES...'; }
            else { loader.classList.remove('show'); btn.disabled = false; btn.textContent = 'CEK DOMAIN'; }
        }

        window.checkDomain = function() {
            const domain = document.getElementById('domainInput').value.trim();
            if (!domain) { showToast('Masukkan domain!', 'error'); return; }
            document.getElementById('errorState').classList.remove('show');
            document.getElementById('resultSection').classList.remove('show');
            setLoading(true);

            Promise.all([
                fetch(DNS_API + encodeURIComponent(domain)).then(r => r.json()),
                fetch(SUB_API + encodeURIComponent(domain)).then(r => r.json())
            ]).then(([dnsData, subData]) => {
                setLoading(false);
                if (dnsData.status && dnsData.data) {
                    document.getElementById('rDomain').textContent = dnsData.data.unicodeDomain || domain;
                    document.getElementById('rPunycode').textContent = dnsData.data.punycodeDomain || '-';

                    // Subdomains
                    const list = document.getElementById('subdomainsList');
                    list.innerHTML = '';
                    if (subData.status && subData.data && subData.data.length > 0) {
                        const clean = subData.data.map(s => s.split('\n').pop().trim()).filter(s => s && !s.startsWith('*'));
                        clean.forEach(s => {
                            const div = document.createElement('div');
                            div.className = 'subdomain-item';
                            div.innerHTML = `<span>${s}</span><span class="copy" onclick="copyText('${s}')"><i class="fas fa-copy"></i></span>`;
                            list.appendChild(div);
                        });
                    } else {
                        list.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:13px;padding:8px 0;">Tidak ada subdomain ditemukan</div>';
                    }

                    document.getElementById('resultSection').classList.add('show');
                    showToast('✅ Data domain ditemukan!', 'success');
                } else {
                    showError('Domain tidak ditemukan');
                }
            }).catch(err => { setLoading(false); showError(err.message); });
        };

        window.copyText = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Disalin!', 'success');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                showToast('✅ Disalin!', 'success');
            });
        };

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorState').classList.add('show');
            showToast('❌ ' + msg, 'error');
        }

        document.getElementById('domainInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') checkDomain(); });
        if (!sessionKey || !username) window.location.href = 'login.html';
    </script>
</body>
</html>
