<!-- manage_server.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Server - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D0221; color: #fff; font-family: 'Share Tech Mono', monospace;
            min-height: 100vh; background: linear-gradient(180deg, #0D0221 0%, #1A0533 50%, #0D0221 100%);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7B1FA2; border-radius: 4px; }

        .app-header {
            display: flex; align-items: center; padding: 16px 20px;
            background: rgba(13,2,33,0.95); border-bottom: 1px solid rgba(234,128,252,0.1);
            position: sticky; top: 0; z-index: 10;
        }
        .app-header .back-btn {
            background: none; border: none; color: #EA80FC; font-size: 20px;
            cursor: pointer; padding: 4px; margin-right: 12px;
        }
        .app-header .title {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
            color: #fff; flex: 1; text-align: center;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 16px 20px; padding-bottom: 40px; }

        .card {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(123,31,162,0.2); margin-bottom: 16px;
        }
        .card .header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
        }
        .card .header .title {
            display: flex; align-items: center; gap: 10px;
        }
        .card .header .title i { color: #EA80FC; font-size: 18px; }
        .card .header .title h3 { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #EA80FC; }
        .card .header .add-btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 11px;
            cursor: pointer; transition: all 0.2s;
        }
        .card .header .add-btn:hover { transform: scale(1.05); }

        .server-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 8px;
        }
        .server-item:last-child { margin-bottom: 0; }
        .server-item .info .host { font-size: 14px; font-weight: 600; color: #fff; }
        .server-item .info .user { font-size: 12px; color: rgba(255,255,255,0.4); }
        .server-item .del-btn {
            padding: 6px 12px; border: none; border-radius: 6px;
            background: rgba(255,0,0,0.1); color: #ff6b6b;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 10px;
            cursor: pointer; transition: all 0.2s;
        }
        .server-item .del-btn:hover { background: rgba(255,0,0,0.2); }

        .empty-state {
            text-align: center; padding: 30px 0; color: rgba(255,255,255,0.3);
            font-size: 14px;
        }
        .empty-state i { font-size: 40px; color: rgba(234,128,252,0.2); margin-bottom: 12px; display: block; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; display: none;
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #0D0221; border-radius: 24px; border: 1px solid rgba(234,128,252,0.2);
            max-width: 400px; width: 100%; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal .modal-title {
            font-family: 'Orbitron', sans-serif; font-size: 16px; color: #fff;
            text-align: center; margin-bottom: 16px;
        }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label {
            display: block; font-size: 11px; color: rgba(255,255,255,0.5);
            font-family: 'Orbitron', sans-serif; letter-spacing: 1px; margin-bottom: 4px;
        }
        .modal .form-group input {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(123,31,162,0.3); background: rgba(255,255,255,0.05);
            color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        .modal .form-group input:focus { border-color: #EA80FC; }
        .modal .modal-actions {
            display: flex; gap: 12px; margin-top: 20px;
        }
        .modal .modal-actions button {
            flex: 1; padding: 14px; border: none; border-radius: 12px;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .modal .modal-actions .btn-cancel {
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal .modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .modal .modal-actions .btn-add {
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
        }
        .modal .modal-actions .btn-add:hover { transform: scale(1.02); }
        .modal .modal-actions .btn-add:disabled { opacity: 0.6; cursor: not-allowed; transform: scale(1); }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            max-width: 500px; width: calc(100% - 32px); padding: 14px 20px;
            border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 2000;
            display: none; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
        }
        .toast.show { display: block; }
        .toast.success { background: rgba(76,175,80,0.9); color: #fff; }
        .toast.error { background: rgba(255,0,0,0.85); color: #fff; }
        .toast.info { background: rgba(123,31,162,0.9); color: #fff; }
        @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <span class="title">MANAGE SERVER</span>
        <div style="width:36px;"></div>
    </header>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title"><i class="fas fa-server"></i><h3>MY VPS LIST</h3></div>
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> ADD</button>
            </div>
            <div id="serverList">
                <div class="empty-state"><i class="fas fa-database"></i>Belum ada VPS terdaftar</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-title"><i class="fas fa-plus-circle"></i> TAMBAH VPS</div>
            <div class="form-group">
                <label>IP VPS</label>
                <input type="text" id="vpsHost" placeholder="192.168.1.100" />
            </div>
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="vpsUser" placeholder="root" />
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="vpsPass" placeholder="********" />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddModal()">BATAL</button>
                <button class="btn-add" id="addBtn" onclick="addVps()">TAMBAH</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'http://private.lynzzofficial.com:2355';
        const sessionKey = localStorage.getItem('sessionKey') || '';
        const username = localStorage.getItem('username') || '';
        let vpsList = [];

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show ' + type;
            clearTimeout(t._timer); t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function fetchVps() {
            fetch(`${API_BASE}/myServer?key=${sessionKey}`)
                .then(res => res.json())
                .then(data => {
                    vpsList = Array.isArray(data) ? data : [];
                    renderVps();
                })
                .catch(() => {
                    vpsList = [];
                    renderVps();
                    showToast('Gagal memuat VPS', 'error');
                });
        }

        function renderVps() {
            const container = document.getElementById('serverList');
            if (vpsList.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-database"></i>Belum ada VPS terdaftar</div>`;
                return;
            }
            let html = '';
            vpsList.forEach(vps => {
                html += `
                    <div class="server-item">
                        <div class="info">
                            <div class="host">${vps.host}</div>
                            <div class="user">User: ${vps.username}</div>
                        </div>
                        <button class="del-btn" onclick="deleteVps('${vps.host}')">DELETE</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('open');
            document.getElementById('vpsHost').value = '';
            document.getElementById('vpsUser').value = '';
            document.getElementById('vpsPass').value = '';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('open');
        }

        function addVps() {
            const host = document.getElementById('vpsHost').value.trim();
            const user = document.getElementById('vpsUser').value.trim();
            const pass = document.getElementById('vpsPass').value.trim();
            if (!host || !user || !pass) { showToast('Isi semua field!', 'error'); return; }

            const btn = document.getElementById('addBtn');
            btn.disabled = true; btn.textContent = 'PROSES...';

            fetch(`${API_BASE}/addServer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: sessionKey, host, username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false; btn.textContent = 'TAMBAH';
                if (data.success) {
                    closeAddModal();
                    showToast('✅ VPS berhasil ditambahkan!', 'success');
                    fetchVps();
                } else {
                    showToast('❌ Gagal menambah VPS', 'error');
                }
            })
            .catch(() => {
                btn.disabled = false; btn.textContent = 'TAMBAH';
                showToast('❌ Error: Gagal terhubung ke server', 'error');
            });
        }

        function deleteVps(host) {
            if (!confirm(`Yakin ingin menghapus VPS ${host}?`)) return;
            fetch(`${API_BASE}/delServer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: sessionKey, host })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast('✅ VPS berhasil dihapus!', 'success');
                    fetchVps();
                } else {
                    showToast('❌ Gagal menghapus VPS', 'error');
                }
            })
            .catch(() => showToast('❌ Error: Gagal terhubung ke server', 'error'));
        }

        document.querySelector('.modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeAddModal();
        });

        if (!sessionKey || !username) window.location.href = 'login.html';
        fetchVps();
    </script>
</body>
</html>
