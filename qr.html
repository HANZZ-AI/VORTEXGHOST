<!-- qr.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D0221;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            background: linear-gradient(180deg, #0D0221 0%, #1A0533 50%, #0D0221 100%);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7B1FA2; border-radius: 4px; }

        .app-header {
            display: flex; align-items: center; padding: 16px 20px;
            background: rgba(13,2,33,0.95); border-bottom: 1px solid rgba(234,128,252,0.1);
            position: sticky; top: 0; z-index: 10;
        }
        .app-header .back-btn {
            background: none; border: none; color: #EA80FC; font-size: 20px;
            cursor: pointer; padding: 4px; margin-right: 12px;
        }
        .app-header .title {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
            color: #fff; flex: 1; text-align: center;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 16px 20px; padding-bottom: 40px; }

        .input-section {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(123,31,162,0.2); margin-bottom: 20px;
        }
        .input-section .header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .input-section .header i { color: #EA80FC; font-size: 20px; }
        .input-section .header h3 {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: #EA80FC;
        }
        .input-section .input-wrap { display: flex; gap: 10px; }
        .input-section .input-wrap input {
            flex: 1; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(123,31,162,0.3); background: rgba(255,255,255,0.05);
            color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        .input-section .input-wrap input:focus { border-color: #EA80FC; }
        .input-section .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        .input-section .input-wrap button {
            padding: 14px 24px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .input-section .input-wrap button:hover { transform: scale(1.02); }
        .input-section .input-wrap button:disabled { opacity: 0.6; cursor: not-allowed; transform: scale(1); }

        .qr-result {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 24px;
            border: 1px solid rgba(123,31,162,0.2); text-align: center; display: none;
        }
        .qr-result.show { display: block; }
        .qr-result .qr-image {
            background: #fff; padding: 20px; border-radius: 16px; display: inline-block;
            max-width: 100%; margin-bottom: 16px;
        }
        .qr-result .qr-image img { max-width: 100%; height: auto; }
        .qr-result .share-btn {
            padding: 14px 32px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .qr-result .share-btn:hover { transform: scale(1.02); }

        .error-state {
            background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3);
            border-radius: 16px; padding: 16px; display: none; margin-bottom: 16px;
        }
        .error-state.show { display: block; }
        .error-state .row { display: flex; align-items: center; gap: 12px; }
        .error-state .row i { color: #ff6b6b; font-size: 20px; }
        .error-state .row p { color: #ff6b6b; font-size: 14px; }

        .loading-state { text-align: center; padding: 40px 0; display: none; }
        .loading-state.show { display: block; }
        .loading-state .spinner {
            width: 40px; height: 40px; margin: 0 auto 12px;
            border: 3px solid rgba(234,128,252,0.2); border-top: 3px solid #EA80FC;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            max-width: 500px; width: calc(100% - 32px); padding: 14px 20px;
            border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 2000;
            display: none; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
        }
        .toast.show { display: block; }
        .toast.success { background: rgba(76,175,80,0.9); color: #fff; }
        .toast.error { background: rgba(255,0,0,0.85); color: #fff; }
        .toast.info { background: rgba(123,31,162,0.9); color: #fff; }
        @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <span class="title">QR GENERATOR</span>
        <div style="width:36px;"></div>
    </header>
    <div class="container">
        <div class="input-section">
            <div class="header"><i class="fas fa-qrcode"></i><h3>MASUKKAN TEXT/URL</h3></div>
            <div class="input-wrap">
                <input type="text" id="qrInput" placeholder="Contoh: https://google.com" />
                <button id="generateBtn" onclick="generateQR()">GENERATE</button>
            </div>
        </div>

        <div class="loading-state" id="loadingState"><div class="spinner"></div><p>Membuat QR Code...</p></div>
        <div class="error-state" id="errorState"><div class="row"><i class="fas fa-exclamation-circle"></i><p id="errorText">Error</p></div></div>

        <div class="qr-result" id="qrResult">
            <div class="qr-image"><img id="qrImage" src="" alt="QR Code" /></div>
            <button class="share-btn" onclick="shareQR()"><i class="fas fa-share-alt"></i> SHARE QR CODE</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'https://api.siputzx.my.id/api/tools/text2qr?text=';
        const sessionKey = localStorage.getItem('sessionKey') || '';
        const username = localStorage.getItem('username') || '';

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show ' + type;
            clearTimeout(t._timer); t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function setLoading(loading) {
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loadingState');
            if (loading) { loader.classList.add('show'); btn.disabled = true; btn.textContent = 'PROSES...'; }
            else { loader.classList.remove('show'); btn.disabled = false; btn.textContent = 'GENERATE'; }
        }

        window.generateQR = function() {
            const text = document.getElementById('qrInput').value.trim();
            if (!text) { showToast('Masukkan text atau URL!', 'error'); return; }
            document.getElementById('errorState').classList.remove('show');
            document.getElementById('qrResult').classList.remove('show');
            setLoading(true);

            fetch(API_BASE + encodeURIComponent(text))
                .then(res => { if (!res.ok) throw new Error('Gagal generate QR'); return res.blob(); })
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    document.getElementById('qrImage').src = url;
                    document.getElementById('qrResult').classList.add('show');
                    setLoading(false);
                    showToast('✅ QR Code berhasil dibuat!', 'success');
                })
                .catch(err => {
                    setLoading(false);
                    document.getElementById('errorText').textContent = err.message;
                    document.getElementById('errorState').classList.add('show');
                    showToast('❌ ' + err.message, 'error');
                });
        };

        window.shareQR = function() {
            const img = document.getElementById('qrImage');
            if (!img.src) return;
            fetch(img.src).then(r => r.blob()).then(blob => {
                if (navigator.share) {
                    navigator.share({ title: 'QR Code', files: [new File([blob], 'qr_code.png', {type: 'image/png'})] })
                        .catch(() => {});
                } else {
                    const a = document.createElement('a');
                    a.href = img.src; a.download = 'qr_code.png'; a.click();
                    showToast('📥 QR Code didownload!', 'success');
                }
            }).catch(() => showToast('Gagal share QR Code', 'error'));
        };

        document.getElementById('qrInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') generateQR(); });

        if (!sessionKey || !username) window.location.href = 'login.html';
    </script>
</body>
</html>
