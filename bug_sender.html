<!-- bug_sender.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Bug Sender - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0D0221;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #7B1FA2;
            border-radius: 4px;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(13, 2, 33, 0.95);
            border-bottom: 1px solid rgba(234, 128, 252, 0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .app-header .back-btn {
            background: none;
            border: none;
            color: #EA80FC;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .app-header .title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            text-shadow: 0 0 20px rgba(123, 31, 162, 0.6);
            flex: 1;
            text-align: center;
            margin: 0 8px;
        }
        .app-header .header-actions {
            display: flex;
            gap: 8px;
        }
        .app-header .header-actions button {
            background: none;
            border: none;
            color: #EA80FC;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state .icon {
            font-size: 64px;
            color: rgba(234, 128, 252, 0.3);
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: #fff;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .empty-state .btn-add-first {
            padding: 14px 32px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(123, 31, 162, 0.4);
            transition: all 0.2s;
        }
        .empty-state .btn-add-first:hover {
            transform: scale(1.02);
        }

        /* Sender Card - SAMA PERSIS DENGAN DART */
        .sender-card {
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            transition: all 0.2s;
        }
        .sender-card .row-top {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .sender-card .row-top .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(123, 31, 162, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #EA80FC;
            flex-shrink: 0;
        }
        .sender-card .row-top .info {
            flex: 1;
        }
        .sender-card .row-top .info .name {
            font-size: 18px;
            font-weight: 400;
            color: #fff;
        }
        .sender-card .row-top .info .phone {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Share Tech Mono', monospace;
        }
        .sender-card .row-top .status-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            background: rgba(234, 128, 252, 0.15);
            color: #EA80FC;
            border: 1px solid rgba(234, 128, 252, 0.3);
        }

        .sender-card .actions-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .sender-card .actions-row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .sender-card .actions-row .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sender-card .actions-row .refresh-btn:hover {
            background: rgba(123, 31, 162, 0.2);
        }
        .sender-card .actions-row .delete-btn {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
        .sender-card .actions-row .delete-btn:hover {
            background: rgba(255, 0, 0, 0.2);
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 500px;
            width: calc(100% - 32px);
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
            box-shadow: 0 8px 30px rgba(123, 31, 162, 0.5);
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .fab:hover {
            transform: translateX(-50%) scale(1.02);
        }
        .fab i {
            margin-right: 8px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #0D0221;
            border-radius: 24px;
            border: 1px solid rgba(234, 128, 252, 0.2);
            max-width: 400px;
            width: 100%;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .modal .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal .modal-title i {
            color: #EA80FC;
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-size: 12px;
            color: #EA80FC;
            margin-bottom: 6px;
        }
        .modal .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(123, 31, 162, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        .modal .form-group input:focus {
            border-color: #EA80FC;
        }
        .modal .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal .modal-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal .modal-actions .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .modal .modal-actions .btn-primary {
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
        }
        .modal .modal-actions .btn-primary:hover {
            transform: scale(1.02);
        }
        .modal .modal-actions .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* Pairing Code Display */
        .pairing-code-box {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
            border: 2px solid #EA80FC;
            box-shadow: 0 0 40px rgba(234, 128, 252, 0.2);
        }
        .pairing-code-box .number-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        .pairing-code-box .code {
            font-family: 'Courier', monospace;
            font-size: 32px;
            font-weight: 700;
            color: #EA80FC;
            letter-spacing: 4px;
            padding: 8px 0;
        }
        .pairing-code-box .copy-btn {
            margin-top: 12px;
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            background: rgba(123, 31, 162, 0.2);
            color: #EA80FC;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(234, 128, 252, 0.2);
            width: 100%;
        }
        .pairing-code-box .copy-btn:hover {
            background: rgba(123, 31, 162, 0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 500px;
            width: calc(100% - 32px);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.3s ease;
        }
        .toast.show {
            display: block;
        }
        .toast.success {
            background: rgba(76, 175, 80, 0.9);
            color: #fff;
        }
        .toast.error {
            background: rgba(255, 0, 0, 0.85);
            color: #fff;
        }
        .toast.info {
            background: rgba(123, 31, 162, 0.9);
            color: #fff;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            flex-direction: column;
            gap: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(234, 128, 252, 0.2);
            border-top: 3px solid #EA80FC;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .error-state .icon {
            font-size: 48px;
            color: #ff6b6b;
            margin-bottom: 16px;
        }
        .error-state h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: #fff;
            margin-bottom: 8px;
        }
        .error-state p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .error-state .retry-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <span class="title">Manage Bug Sender</span>
        <div class="header-actions">
            <button onclick="refreshSenders()" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container" id="mainContainer">
        <!-- Akan diisi oleh JavaScript -->
    </div>

    <!-- ===== FAB ===== -->
    <button class="fab" onclick="openAddModal()">
        <i class="fas fa-plus-circle"></i> ADD SENDER
    </button>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== MODAL ADD SENDER ===== -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-title">
                <i class="fas fa-phone-plus"></i> Add New Sender
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phoneInput" inputmode="numeric" pattern="[0-9]*" placeholder="62xxx" />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddModal()">CANCEL</button>
                <button class="btn-primary" id="addSenderBtn" onclick="addSender()">ADD SENDER</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL PAIRING CODE ===== -->
    <div class="modal-overlay" id="pairingModal">
        <div class="modal">
            <div class="modal-title">
                <i class="fas fa-qrcode"></i> Pairing Required
            </div>
            <div class="pairing-code-box">
                <div class="number-label">Number: <span id="pairingNumber">-</span></div>
                <div class="code" id="pairingCode">XXXX-XXXX</div>
                <button class="copy-btn" onclick="copyPairingCode()">
                    <i class="fas fa-copy"></i> COPY CODE
                </button>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closePairingModal()">CLOSE</button>
                <button class="btn-primary" onclick="closePairingModalAndRefresh()">REFRESH LIST</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  BUG SENDER - SAMA PERSIS DENGAN bug_sender.dart
        // ============================================================

        (function() {
            'use strict';

            // === CONSTANTS ===
            const API_BASE = 'http://private.lynzzofficial.com:2355';

            // === STATE ===
            let sessionKey = localStorage.getItem('sessionKey') || '';
            let username = localStorage.getItem('username') || '';
            let role = localStorage.getItem('role') || 'member';
            let senderList = [];
            let isLoading = false;
            let isRefreshing = false;
            let errorMessage = null;
            let isAdding = false;
            let currentPairingNumber = '';
            let currentPairingCode = '';

            // === DOM REFS ===
            const container = document.getElementById('mainContainer');
            const toast = document.getElementById('toast');
            const addModal = document.getElementById('addModal');
            const pairingModal = document.getElementById('pairingModal');
            const phoneInput = document.getElementById('phoneInput');
            const pairingNumber = document.getElementById('pairingNumber');
            const pairingCode = document.getElementById('pairingCode');
            const addSenderBtn = document.getElementById('addSenderBtn');

            // === HELPERS ===
            function showToast(msg, type = 'info') {
                toast.textContent = msg;
                toast.className = 'toast show ' + type;
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.className = 'toast';
                }, 3000);
            }

            function showLoading() {
                container.innerHTML = `
                    <div class="loading-container">
                        <div class="spinner"></div>
                        <span>Memuat sender...</span>
                    </div>
                `;
            }

            function showError(msg) {
                container.innerHTML = `
                    <div class="error-state">
                        <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3>Failed to Load</h3>
                        <p>${msg}</p>
                        <button class="retry-btn" onclick="refreshSenders()">TRY AGAIN</button>
                    </div>
                `;
            }

            function showEmptyState() {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon"><i class="fas fa-phone-slash"></i></div>
                        <h3>No Senders Found</h3>
                        <p>Add your first WhatsApp sender to get started</p>
                        <button class="btn-add-first" onclick="openAddModal()">
                            <i class="fas fa-plus-circle"></i> ADD FIRST SENDER
                        </button>
                    </div>
                `;
            }

            // === FETCH SENDERS (SAMA PERSIS DENGAN DART) ===
            async function fetchSenders() {
                isLoading = true;
                errorMessage = null;
                showLoading();

                try {
                    const response = await fetch(`${API_BASE}/mySender?key=${sessionKey}`, {
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (response.status === 200) {
                        const data = await response.json();
                        if (data.valid === true) {
                            // Hanya ambil sender dari folder personal user (bukan global)
                            const allSenders = data.connections || [];
                            senderList = allSenders.filter((sender) => {
                                const folder = (sender.folder || '').toLowerCase();
                                const sessionName = (sender.sessionName || '').toLowerCase();
                                // Sama seperti filter di Dart
                                return folder !== 'global' && !sessionName.startsWith('device');
                            });
                            renderSenders();
                        } else {
                            errorMessage = data.message || 'Failed to fetch senders';
                            showError(errorMessage);
                        }
                    } else {
                        errorMessage = `Server error: ${response.status}`;
                        showError(errorMessage);
                    }
                } catch (e) {
                    errorMessage = `Connection failed: ${e.message}`;
                    showError(errorMessage);
                } finally {
                    isLoading = false;
                    isRefreshing = false;
                }
            }

            // === RENDER SENDERS ===
            function renderSenders() {
                if (senderList.length === 0) {
                    showEmptyState();
                    return;
                }

                let html = '';
                senderList.forEach((sender) => {
                    const name = sender.sessionName || 'WhatsApp Sender';
                    const phone = sender.phone || '📱 Personal Sender';
                    const isConnected = sender.connected === true;
                    const statusText = isConnected ? 'CONNECTED' : 'DISCONNECTED';
                    const statusColor = isConnected ? '#EA80FC' : 'rgba(255,255,255,0.3)';

                    html += `
                        <div class="sender-card">
                            <div class="row-top">
                                <div class="avatar"><i class="fas fa-phone-android"></i></div>
                                <div class="info">
                                    <div class="name">${name}</div>
                                    <div class="phone">${phone}</div>
                                </div>
                                <span class="status-badge" style="color:${statusColor};border-color:${statusColor};">${statusText}</span>
                            </div>
                            <div class="actions-row">
                                <button class="refresh-btn" onclick="refreshSingleSender('${sender.id || sender.sessionName}')">
                                    <i class="fas fa-sync-alt"></i> REFRESH
                                </button>
                                <button class="delete-btn" onclick="deleteSender('${sender.id || sender.sessionName}')">
                                    <i class="fas fa-trash-alt"></i> DELETE
                                </button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            }

            // === REFRESH SENDERS ===
            async function refreshSenders() {
                isRefreshing = true;
                await fetchSenders();
                showToast('Senders refreshed!', 'success');
            }

            // === REFRESH SINGLE SENDER ===
            async function refreshSingleSender(senderId) {
                showToast('Refreshing sender...', 'info');
                await fetchSenders();
            }

            // === ADD SENDER ===
            async function addSender() {
                const number = phoneInput.value.trim();
                if (!number) {
                    showToast('Please enter phone number', 'error');
                    return;
                }

                if (isAdding) return;
                isAdding = true;
                addSenderBtn.disabled = true;
                addSenderBtn.textContent = 'PROCESSING...';

                try {
                    const response = await fetch(`${API_BASE}/getPairing?key=${sessionKey}&number=${number}`);

                    if (response.status === 200) {
                        const data = await response.json();
                        if (data.valid === true) {
                            currentPairingNumber = number;
                            currentPairingCode = data.pairingCode;
                            closeAddModal();
                            showPairingModal(number, data.pairingCode);
                            showToast('Pairing code generated successfully!', 'success');
                        } else {
                            showToast(data.message || 'Failed to generate pairing code', 'error');
                        }
                    } else {
                        showToast(`Server error: ${response.status}`, 'error');
                    }
                } catch (e) {
                    showToast(`Connection failed: ${e.message}`, 'error');
                } finally {
                    isAdding = false;
                    addSenderBtn.disabled = false;
                    addSenderBtn.textContent = 'ADD SENDER';
                }
            }

            // === DELETE SENDER ===
            async function deleteSender(senderId) {
                // Konfirmasi seperti di Dart
                const confirmed = confirm('Are you sure you want to delete this sender? This action cannot be undone.');
                if (!confirmed) return;

                isLoading = true;
                showLoading();

                try {
                    const response = await fetch(`${API_BASE}/deleteSender?key=${sessionKey}&id=${senderId}`, {
                        method: 'DELETE'
                    });

                    if (response.status === 200) {
                        const data = await response.json();
                        if (data.valid === true) {
                            showToast('Sender deleted successfully!', 'success');
                            await fetchSenders();
                        } else {
                            showToast(data.message || 'Failed to delete sender', 'error');
                        }
                    } else {
                        showToast(`Server error: ${response.status}`, 'error');
                    }
                } catch (e) {
                    showToast(`Connection failed: ${e.message}`, 'error');
                } finally {
                    isLoading = false;
                }
            }

            // === MODAL FUNCTIONS ===
            function openAddModal() {
                phoneInput.value = '';
                addModal.classList.add('open');
                setTimeout(() => phoneInput.focus(), 100);
            }

            function closeAddModal() {
                addModal.classList.remove('open');
            }

            function showPairingModal(number, code) {
                pairingNumber.textContent = number;
                pairingCode.textContent = code.match(/.{1,4}/g)?.join('-') || code;
                pairingModal.classList.add('open');
            }

            function closePairingModal() {
                pairingModal.classList.remove('open');
            }

            function closePairingModalAndRefresh() {
                pairingModal.classList.remove('open');
                fetchSenders();
            }

            function copyPairingCode() {
                const code = pairingCode.textContent.replace(/-/g, '');
                navigator.clipboard.writeText(code).then(() => {
                    showToast('Code copied to clipboard!', 'success');
                }).catch(() => {
                    // Fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = code;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('Code copied to clipboard!', 'success');
                });
            }

            // === CLOSE MODAL ON OVERLAY CLICK ===
            document.querySelectorAll('.modal-overlay').forEach((overlay) => {
                overlay.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('open');
                    }
                });
            });

            // === INPUT ONLY NUMBERS ===
            phoneInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });

            // === ENTER KEY SUPPORT ===
            phoneInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    addSender();
                }
            });

            // === EXPOSE GLOBAL FUNCTIONS ===
            window.openAddModal = openAddModal;
            window.closeAddModal = closeAddModal;
            window.addSender = addSender;
            window.deleteSender = deleteSender;
            window.refreshSingleSender = refreshSingleSender;
            window.refreshSenders = refreshSenders;
            window.copyPairingCode = copyPairingCode;
            window.closePairingModal = closePairingModal;
            window.closePairingModalAndRefresh = closePairingModalAndRefresh;

            // === INIT ===
            if (!sessionKey || !username) {
                window.location.href = 'login.html';
                return;
            }

            fetchSenders();

        })();
    </script>

</body>
</html>
