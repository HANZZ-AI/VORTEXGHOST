<!-- anime_home.html (FIXED) -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Stream - Vortex Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D0221; color: #fff; font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7B1FA2; border-radius: 4px; }

        .app-header {
            display: flex; align-items: center; padding: 16px 20px;
            background: rgba(13,2,33,0.95); border-bottom: 1px solid rgba(234,128,252,0.1);
            position: sticky; top: 0; z-index: 10;
        }
        .app-header .back-btn {
            background: none; border: none; color: #EA80FC; font-size: 20px;
            cursor: pointer; padding: 4px; margin-right: 12px;
        }
        .app-header .title {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
            color: #fff; flex: 1; text-align: center;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 16px 20px; padding-bottom: 40px; }

        .search-bar {
            display: flex; gap: 10px; margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(123,31,162,0.3); background: rgba(255,255,255,0.05);
            color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        .search-bar input:focus { border-color: #EA80FC; }
        .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
        .search-bar button {
            padding: 14px 20px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .search-bar button:hover { transform: scale(1.02); }

        .category-row {
            display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 16px 0;
            scrollbar-width: none;
        }
        .category-row::-webkit-scrollbar { display: none; }
        .category-row .cat {
            padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(123,31,162,0.3);
            background: transparent; color: rgba(255,255,255,0.6); font-size: 12px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
            font-family: 'Orbitron', sans-serif;
        }
        .category-row .cat.active {
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            border-color: #EA80FC; box-shadow: 0 0 20px rgba(123,31,162,0.3);
        }

        .anime-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .anime-card {
            background: rgba(255,255,255,0.05); border-radius: 16px;
            overflow: hidden; border: 1px solid rgba(123,31,162,0.2);
            cursor: pointer; transition: all 0.2s;
        }
        .anime-card:hover { transform: translateY(-4px); border-color: #EA80FC; }
        .anime-card .poster {
            width: 100%; aspect-ratio: 2/3; object-fit: cover;
            background: rgba(255,255,255,0.05);
        }
        .anime-card .info { padding: 10px 12px; }
        .anime-card .info .title {
            font-size: 13px; font-weight: 600; color: #fff;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .anime-card .info .meta {
            font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px;
        }
        .anime-card .info .score {
            color: #FFD700; font-size: 12px; font-weight: 700;
        }

        /* Modal Player */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; display: none;
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-player {
            background: #0D0221; border-radius: 24px; border: 1px solid rgba(234,128,252,0.2);
            max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto;
            padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-player .close-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 24px; cursor: pointer; float: right;
        }
        .modal-player .close-btn:hover { color: #fff; }
        .modal-player .video-container {
            border-radius: 12px; overflow: hidden; background: #000;
            margin: 12px 0; position: relative; padding-bottom: 56.25%; height: 0;
        }
        .modal-player .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
        .modal-player .anime-title {
            font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff;
            margin-bottom: 4px;
        }
        .modal-player .anime-meta {
            font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 12px;
        }
        .modal-player .episode-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            margin-top: 12px;
        }
        .modal-player .episode-grid .ep {
            padding: 10px 0; border-radius: 8px; border: 1px solid rgba(123,31,162,0.3);
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
            text-align: center; font-size: 12px; cursor: pointer; transition: all 0.2s;
            font-family: 'Share Tech Mono', monospace;
        }
        .modal-player .episode-grid .ep:hover { background: rgba(123,31,162,0.2); border-color: #EA80FC; }
        .modal-player .episode-grid .ep.active {
            background: linear-gradient(135deg, #7B1FA2, #EA80FC); color: #fff;
            border-color: #EA80FC;
        }

        .loading-state { text-align: center; padding: 40px 0; display: none; }
        .loading-state.show { display: block; }
        .loading-state .spinner {
            width: 40px; height: 40px; margin: 0 auto 12px;
            border: 3px solid rgba(234,128,252,0.2); border-top: 3px solid #EA80FC;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            max-width: 500px; width: calc(100% - 32px); padding: 14px 20px;
            border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 2000;
            display: none; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
        }
        .toast.show { display: block; }
        .toast.success { background: rgba(76,175,80,0.9); color: #fff; }
        .toast.error { background: rgba(255,0,0,0.85); color: #fff; }
        .toast.info { background: rgba(123,31,162,0.9); color: #fff; }
        @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <header class="app-header">
        <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <span class="title">ANIME STREAM</span>
        <div style="width:36px;"></div>
    </header>
    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari anime..." />
            <button onclick="searchAnime()"><i class="fas fa-search"></i></button>
        </div>

        <div class="category-row" id="categoryRow">
            <span class="cat active" data-cat="airing">Top Airing</span>
            <span class="cat" data-cat="upcoming">Upcoming</span>
            <span class="cat" data-cat="popular">Popular</span>
            <span class="cat" data-cat="action">Action</span>
            <span class="cat" data-cat="romance">Romance</span>
            <span class="cat" data-cat="drama">Drama</span>
            <span class="cat" data-cat="fantasy">Fantasy</span>
        </div>

        <div class="loading-state" id="loadingState"><div class="spinner"></div><p>Memuat anime...</p></div>
        <div class="anime-grid" id="animeGrid"></div>
    </div>

    <!-- Modal Player -->
    <div class="modal-overlay" id="playerModal">
        <div class="modal-player">
            <button class="close-btn" onclick="closePlayer()"><i class="fas fa-times"></i></button>
            <div class="anime-title" id="playerTitle">-</div>
            <div class="anime-meta" id="playerMeta">-</div>
            <div class="video-container"><iframe id="playerFrame" src="" allowfullscreen></iframe></div>
            <div class="episode-grid" id="episodeGrid"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const JIKAN_API = 'https://api.jikan.moe/v4';
        const SEARCH_API = 'https://api.siputzx.my.id/api/s/youtube'; // Untuk search video
        const sessionKey = localStorage.getItem('sessionKey') || '';
        const username = localStorage.getItem('username') || '';
        let currentCategory = 'airing';
        let currentAnime = null;
        let currentEpisode = 1;
        let totalEpisodes = 24;

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show ' + type;
            clearTimeout(t._timer); t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function setLoading(loading) {
            const loader = document.getElementById('loadingState');
            if (loading) loader.classList.add('show');
            else loader.classList.remove('show');
        }

        function fetchAnime(url) {
            setLoading(true);
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    setLoading(false);
                    if (data.data && data.data.length > 0) {
                        renderAnime(data.data);
                    } else {
                        grid.innerHTML = '<div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.4);">Tidak ada anime ditemukan</div>';
                    }
                })
                .catch(() => {
                    setLoading(false);
                    grid.innerHTML = '<div style="text-align:center;padding:40px 0;color:#ff6b6b;">Gagal memuat data</div>';
                });
        }

        function renderAnime(list) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';
            list.forEach(item => {
                const title = item.title || item.title_english || item.title_japanese || 'No Title';
                const image = item.images?.jpg?.large_image_url || '';
                const score = item.score || 0;
                const type = item.type || 'TV';
                const year = item.year || '?';
                const episodes = item.episodes || 24;

                const card = document.createElement('div');
                card.className = 'anime-card';
                card.innerHTML = `
                    <img class="poster" src="${image}" alt="${title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22300%22%3E%3Crect fill=%22%231A0533%22 width=%22200%22 height=%22300%22/%3E%3Ctext fill=%22%23666%22 font-size=%2220%22 x=%2250%22 y=%22150%22%3ENo Image%3C/text%3E%3C/svg%3E'" />
                    <div class="info">
                        <div class="title">${title}</div>
                        <div class="meta">${type} • ${year} • ${episodes} eps</div>
                        <div class="score"><i class="fas fa-star" style="color:#FFD700;font-size:10px;"></i> ${score.toFixed(1)}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    openPlayer(item);
                });
                grid.appendChild(card);
            });
        }

        function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { fetchAnime(`${JIKAN_API}/top/anime?filter=airing&limit=20`); return; }
            fetchAnime(`${JIKAN_API}/anime?q=${encodeURIComponent(query)}&sfw=true&limit=20`);
        }

        // ===== PLAYER =====
        function openPlayer(anime) {
            currentAnime = anime;
            currentEpisode = 1;
            totalEpisodes = anime.episodes || 24;
            if (totalEpisodes > 200) totalEpisodes = 200;

            document.getElementById('playerTitle').textContent = anime.title || anime.title_english || 'No Title';
            document.getElementById('playerMeta').textContent = `${anime.type || 'TV'} • ${anime.year || '?'} • ${totalEpisodes} episodes`;
            document.getElementById('playerModal').classList.add('open');

            renderEpisodes();
            searchEpisode(anime.title, 1);
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('open');
            document.getElementById('playerFrame').src = '';
        }

        function renderEpisodes() {
            const grid = document.getElementById('episodeGrid');
            grid.innerHTML = '';
            const maxEp = Math.min(totalEpisodes, 200);
            for (let i = 1; i <= maxEp; i++) {
                const div = document.createElement('div');
                div.className = 'ep' + (i === currentEpisode ? ' active' : '');
                div.textContent = i;
                div.addEventListener('click', () => {
                    currentEpisode = i;
                    renderEpisodes();
                    searchEpisode(currentAnime.title, i);
                });
                grid.appendChild(div);
            }
        }

        function searchEpisode(title, episode) {
            const queries = [
                `${title} Episode ${episode} Subtitle Indonesia`,
                `${title} Episode ${episode} Sub Indo`,
                `${title} Episode ${episode}`,
                `${title} Ep ${episode}`,
            ];

            let found = false;

            queries.forEach((query, index) => {
                if (found) return;
                setTimeout(() => {
                    fetch(SEARCH_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.data && data.data.length > 0) {
                            const video = data.data[0];
                            let videoId = video.videoId || video.id;
                            if (!videoId && video.url) {
                                const match = video.url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})(?:[&?]|$)/);
                                if (match) videoId = match[1];
                            }
                            if (videoId && !found) {
                                found = true;
                                document.getElementById('playerFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                                showToast(`✅ Memutar Episode ${episode}`, 'success');
                            }
                        }
                    })
                    .catch(() => {});
                }, index * 500);
            });

            // Fallback jika tidak ditemukan
            setTimeout(() => {
                if (!found) {
                    document.getElementById('playerFrame').src = '';
                    showToast(`❌ Episode ${episode} tidak ditemukan di YouTube`, 'error');
                }
            }, 4000);
        }

        // Close modal with ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePlayer();
        });

        // Category click
        document.querySelectorAll('.category-row .cat').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.category-row .cat').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                const filterMap = { airing: 'airing', upcoming: 'upcoming', popular: 'bypopularity' };
                const filter = filterMap[currentCategory] || 'airing';
                fetchAnime(`${JIKAN_API}/top/anime?filter=${filter}&limit=20`);
            });
        });

        document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchAnime(); });

        if (!sessionKey || !username) window.location.href = 'login.html';
        fetchAnime(`${JIKAN_API}/top/anime?filter=airing&limit=20`);
    </script>
</body>
</html>
